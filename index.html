    <!--
      App-root detection + SPA fallback restore (rafgraph/spa-github-pages).
      MUST be the first element after charset: the <base> it writes anchors
      every relative URL below (favicons, ./assets modules, img/… photography)
      to the app root — /<repo>/ on github.io project pages, / on a custom
      domain. Keep the host test in sync with client/public/404.html.
      The base tag is also what makes the history.replaceState safe: without
      it, the parser resolved ./assets against the restored deep path and
      every module 404'd — blank page on any hard-loaded deep link.
    -->
    <script type="text/javascript">
      (function (l) {
        var keep = /\.github\.io$/.test(l.hostname) ? 1 : 0;
        var root = l.pathname.split('/').slice(0, 1 + keep).join('/') + '/';
        document.write('<base href="' + root + '">');
        window.__NX_APP_BASE__ = root === '/' ? '' : root.slice(0, -1);
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            root.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
