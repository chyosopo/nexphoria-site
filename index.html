    <!--
      SPA fallback restore (rafgraph/spa-github-pages).
      Runs before the app boots. When 404.html redirected a deep link to
      "/?/real/path", this decodes it back into the real path via
      history.replaceState so wouter (real path routing) renders the right
      route on first paint. No-op for normal loads.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
