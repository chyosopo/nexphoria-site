name: Localize external assets
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  localize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: design/azure }
      - name: Download all manifest assets (tolerant, self-reporting)
        run: |
          mkdir -p client/public/img
          R=scripts/asset-report.txt
          echo "asset localization report — $(date -u)" > $R
          MAP=client/public/img/asset-map.json
          echo "{" > $MAP; first=1; ok=0; bad=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            name="img_$(echo -n "$url" | sha1sum | cut -c1-12)"
            tmp="/tmp/$name"
            code=$(curl -sL --retry 2 --max-time 60 -H "Accept: image/*" -o "$tmp" -w '%{http_code}' "$url" || echo "curlfail")
            mime=$(file -b --mime-type "$tmp" 2>/dev/null || echo "none")
            case "$mime" in
              image/webp) ext=webp;; image/png) ext=png;;
              image/jpeg) ext=jpg;;  image/avif) ext=avif;; image/gif) ext=gif;; video/mp4) ext=mp4;; video/webm) ext=webm;;
              *) ext="";;
            esac
            if [ "$code" = "200" ] && [ -n "$ext" ]; then
              mv "$tmp" "client/public/img/$name.$ext"
              [ $first = 1 ] || echo "," >> $MAP; first=0
              printf '  "%s": "img/%s.%s"' "$url" "$name" "$ext" >> $MAP
              echo "OK   $code $mime $name.$ext $url" >> $R; ok=$((ok+1))
            else
              hdr=$(curl -sIL --max-time 30 -H "Accept: image/*" "$url" | grep -i "^content-type" | tail -1 | tr -d '\r')
              snip=$(head -c 120 "$tmp" 2>/dev/null | tr -d '\n\r' | cut -c1-120)
              echo "BAD  $code mime=$mime [$hdr] snip=[$snip] $url" >> $R; bad=$((bad+1))
            fi
          done < scripts/asset-manifest.txt
          echo "" >> $MAP; echo "}" >> $MAP
          echo "TOTAL ok=$ok bad=$bad" >> $R
          cat $R | tail -3
      - name: Commit whatever succeeded + the report
        run: |
          git config user.name "asset-localizer"
          git config user.email "assets@nexphoria"
          git add client/public/img scripts/asset-report.txt || true
          git commit -m "Asset localization run: assets + report" || echo "nothing to commit"
          git push origin design/azure || true
