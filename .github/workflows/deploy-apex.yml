# Apex deploy — nexphoria.com (Cloudflare Pages project `nexphoria`).
#
# MANUAL TRIGGER ONLY (workflow_dispatch): apex publishes are public and
# require Chiya's explicit go-ahead each time (CLAUDE.md hard rule 2).
# This workflow exists so the deploy can run from CI instead of only from
# the Mac's wrangler OAuth login.
#
# Requires repo secrets:
#   CLOUDFLARE_API_TOKEN   — API token with Cloudflare Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID  — (only needed if the token sees >1 account)
#
# ⚠️ The 404.html is REMOVED before deploy: a top-level 404.html disables
# Cloudflare Pages' automatic SPA fallback (and beats _redirects), turning
# every deep link into a hard 404. The 404.html is gh-pages-only.
name: Deploy Apex (Cloudflare Pages)

on:
  workflow_dispatch:

concurrency:
  group: deploy-apex
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/azure

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: "Gate — typecheck"
        run: npm run check

      - name: "Gate — build"
        run: npm run build

      - name: Prepare apex artifact (no 404.html on the apex)
        run: rm -f dist/public/404.html

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Create a Cloudflare API token with 'Cloudflare Pages: Edit' and add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx wrangler pages deploy dist/public --project-name=nexphoria --branch=main --commit-dirty=true

      - name: Verify apex serves the new build (deep links must 200)
        run: |
          sleep 20
          fail=0
          for p in / /pricing /stacks/ascend /women; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://nexphoria.com$p")
            echo "https://nexphoria.com$p -> $code"
            [ "$code" = "200" ] || fail=1
          done
          exit $fail
